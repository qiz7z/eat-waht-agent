services:
  api:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3

  gradio:
    build: .
    command: ["python", "app.py"]
    ports:
      - "7860:7860"
    env_file:
      - .env
    volumes:
      - ./logs:/app/logs
    restart: unless-stopped
    profiles:
      - gradio
